name: Synthetic Monitoring Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # required by peaceiris/actions-gh-pages to push the gh-pages branch

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium and system dependencies
        run: playwright install chromium --with-deps

      - name: Run test suite
        run: pytest -ra

      - name: Fetch Allure history from gh-pages
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true   # branch won't exist on the very first run
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure history into results
        if: always()
        run: cp -r gh-pages/history allure-results/history 2>/dev/null || true

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline@2.29.0 --quiet
          allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: Upload raw Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: test-results/
          retention-days: 7
