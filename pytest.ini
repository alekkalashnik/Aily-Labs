[pytest]
base_url = https://play.grafana.org
addopts =
    --browser chromium
    -ra
    --alluredir=./allure-results
    --video=retain-on-failure
    --tracing=retain-on-failure
testpaths = tests
markers =
    smoke: P0 smoke test — must pass for the app to be considered reachable.
    P0: priority-zero (blocker) test.
    blocker: severity blocker — highest Allure severity bucket.
    critical: severity critical — Allure severity bucket.
    structure: structural / schema validation (data-shape, not value equality).
    filter: exercises a filter / search control.
    idempotence: asserts refresh-idempotence or round-trip invariant.
    navigation: exercises navigation elements (menus, breadcrumbs, links).
    quarantine: forward declaration — tag flaky tests here to exclude them from required CI checks during investigation.
